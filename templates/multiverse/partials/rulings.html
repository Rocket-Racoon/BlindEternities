{% if rulings %}
<div class="space-y-4">
  {% for ruling in rulings %}
  <div class="card p-4">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-xs text-gray-400 dark:text-gray-500">{{ ruling.published_at }}</span>
      <span class="text-xs px-2 py-0.5 rounded-full
                   bg-gray-100 text-gray-500 dark:bg-void-800 dark:text-gray-500">
        {{ ruling.source|upper }}
      </span>
    </div>
    <p class="text-sm text-gray-900 dark:text-gray-100">{{ ruling.comment }}</p>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="card p-8 text-center text-gray-400 dark:text-gray-600 text-sm">
  No hay rulings para esta carta.
</div>
{% endif %}
