{# templates/nexus/home.html #}
{% extends "base.html" %}

{% block title %}Home — {{ site_name }}{% endblock %}

{% block content %}
<div class="text-center py-20">
  <h1 class="font-display text-5xl font-semibold text-void-600 dark:text-void-400 mb-4">
    {{ site_name }}
  </h1>
  <p class="text-lg text-gray-500 dark:text-gray-400 mb-8">
    Tu colección, tus decks, tu historia.
  </p>
  {% if not request.user.is_authenticated %}
  <div class="flex justify-center gap-4">
    <a href="{% url 'account_signup' %}" class="btn-primary">Register</a>
    <a href="{% url 'account_login' %}" class="btn-secondary">Login</a>
  </div>
  {% endif %}
</div>
{% endblock %}
